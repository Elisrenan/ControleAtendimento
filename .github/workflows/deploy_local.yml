name: CI — ControleAtendimento

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Testes + Cobertura
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Instalar dependências de desenvolvimento
        run: pip install -r requirements-dev.txt
      - name: Rodar testes com cobertura
        run: pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  code-quality:
    name: Qualidade de Código
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Instalar ferramentas de qualidade
        run: pip install black isort flake8 bandit
      - name: black — formatação
        run: black . --check
      - name: isort — ordenação de imports
        run: isort . --profile black --check-only
      - name: flake8 — linting
        run: flake8 .
      - name: bandit — segurança
        run: bandit -r domain/ infrastructure/ services/ utils/ ui/ main.py