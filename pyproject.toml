[tool.black]
line-length = 88
target-version = ["py38", "py39", "py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 88

[tool.bandit]
# Escanear apenas código de produção (tests usam assert propositalmente)
targets = ["domain", "infrastructure", "services", "utils", "ui", "main.py"]
